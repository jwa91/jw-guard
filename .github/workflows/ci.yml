name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check and clippy
        run: make check

      - name: Cargo tests
        run: make test

      - name: Verify wire schema drift
        run: |
          cargo run -p jw-guard-wire --bin export_schema
          git diff --exit-code -- schemas/declared-spec-wire.schema.json
